<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>PDF Vorschau</title>

<style>
    @page {
        size: A4;
        margin: 15mm;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .content {
        width: 100%;
        box-sizing: border-box;
        page-break-inside: auto;
    }

    table, tr, td, th {
        page-break-inside: avoid;
    }
</style>
</head>

<body>

<div id="content" class="content">Wird geladen…</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const html = params.get("html");

    // Wenn kein Inhalt übergeben wurde → Fehlermeldung anzeigen
    if (!html) {
        document.getElementById("content").innerHTML =
            "<h2>Kein Inhalt übergeben.</h2><p>Die Seite muss mit ?html=... aufgerufen werden.</p>";
    } else {
        document.getElementById("content").innerHTML = html;
    }

    // Druck erst starten, wenn DOM sichtbar ist
    window.onload = () => {
        setTimeout(() => {
            window.print();
        }, 500);
    };
</script>

</body>
</html>
