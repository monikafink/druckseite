<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>PDF Vorschau</title>

<style>
   @page {
    size: A4;
    margin: 0;
}

body {
    margin: 0 !important;
    padding: 0 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
}


    .content {
        width: 100%;
        box-sizing: border-box;
        page-break-inside: auto;
    }

    table, tr, td, th {
        page-break-inside: avoid;
    }

    #printButton {
        padding: 10px 20px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 20px;
        font-size: 16px;
    }
</style>
</head>

<body>

<button id="printButton">Drucken</button>
<div id="content" class="content">Wird geladen…</div>

<script>
    // POST-Daten auslesen
    window.onload = () => {
        if (window.location.hash) {
            const decoded = decodeURIComponent(window.location.hash.substring(1));
            document.getElementById("content").innerHTML = decoded;
        } else {
            document.getElementById("content").innerHTML =
                "<h2>Kein Inhalt empfangen.</h2>";
        }
    };

    document.getElementById("printButton").onclick = () => {
        window.print();
    };
</script>

</body>
</html>
