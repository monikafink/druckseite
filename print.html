<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>PDF Vorschau</title>

<style>
    /* ⭐ Vollständig randlos */
    @page {
        size: A4;
        margin: 0 !important;
    }

    /* ⭐ Keine Browser-Ränder, Farben erzwingen */
    html, body {
        margin: 0 !important;
        padding: 0 !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        background: white !important;
    }

    /* ⭐ Inhalt ohne zusätzliche Abstände */
    #content {
        margin: 0 !important;
        padding: 0 !important;
        width: 100%;
        box-sizing: border-box;
        page-break-inside: auto;
    }

    /* ⭐ Druckbutton (nur auf Bildschirm sichtbar) */
    #printButton {
        padding: 10px 20px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 20px;
        font-size: 16px;
    }

    /* ⭐ Beim Drucken komplett ausblenden */
    @media print {
        #printButton {
            display: none !important;
        }
    }
</style>
</head>

<body>

<button id="printButton">Drucken</button>
<div id="content">Wird geladen…</div>

<script>
    window.onload = () => {
        if (window.location.hash) {
            const decoded = decodeURIComponent(window.location.hash.substring(1));
            document.getElementById("content").innerHTML = decoded;
        } else {
            document.getElementById("content").innerHTML =
                "<h2>Kein Inhalt empfangen.</h2>";
        }
    };

    document.getElementById("printButton").onclick = () => {
        window.print();
    };
</script>

</body>
</html>
