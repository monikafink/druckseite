<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>PDF Vorschau</title>

<style>
    @page {
        size: A4;
        margin: 15mm;
    }

    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
    }

    .content {
        width: 100%;
        box-sizing: border-box;
        page-break-inside: auto;
    }

    table, tr, td, th {
        page-break-inside: avoid;
    }

    #printButton {
        padding: 10px 20px;
        background: #0078d4;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 20px;
        font-size: 16px;
    }
</style>
</head>

<body>

<button id="printButton">Drucken</button>
<div id="content" class="content">Wird geladen…</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const html = params.get("html");

    if (!html) {
        document.getElementById("content").innerHTML =
            "<h2>Kein Inhalt übergeben.</h2><p>Die Seite muss mit ?html=... aufgerufen werden.</p>";
    } else {
        document.getElementById("content").innerHTML = html;
    }

    document.getElementById("printButton").onclick = () => {
        window.print();
    };
</script>

</body>
</html>
